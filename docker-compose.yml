services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smarthome-ai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./memory_db:/app/memory_db
      - ./smarthome.db:/app/smarthome.db
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: smarthome-ai-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: smarthome-network